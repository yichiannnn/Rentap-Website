  <style>
    .sport-hero {

      background: var(--ink);
      position: relative;
      overflow: hidden;
    }
    .sport-hero-pattern {

      opacity: 0.5;
    }
    .sport-hero-pattern::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 20%, var(--ink) 85%);
    }
    .sport-hero-inner {
      position: relative;
      z-index: 1;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      color: var(--text-muted);
      font-size: .9rem;
      margin-bottom: 2rem;
      transition: color 200ms;
    }
    .back-link:hover { color: var(--light); }
    .sport-icon-lg {
      width: 4rem;
      height: 4rem;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .sport-icon-lg svg { width: 100%; height: 100%; }
    .sport-title {
      font-family: var(--display);
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: .06em;
      color: var(--light);
      line-height: 1;
      margin-bottom: .5rem;
    }
    .sport-subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* Quick-info chips */
    .sport-chips {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      margin-top: 1.5rem;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .35rem .85rem;
      background: rgba(200,146,42,.1);
      border: 1px solid rgba(200,146,42,.25);
      border-radius: 999px;
      font-size: .82rem;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: .03em;
    }
    .chip svg { flex-shrink: 0; }

    /* Rules body */
    .rules-body { padding-block: clamp(3rem, 6vw, 5rem); }
    .rules-col { max-width: 820px; }

    .rules-section { margin-bottom: 3rem; }
    .rules-section-title {
      font-family: var(--display);
      font-size: 1.5rem;
      letter-spacing: .06em;
      color: var(--gold);
      margin-bottom: 1.2rem;
      padding-bottom: .6rem;
      border-bottom: 1px solid var(--border);
    }
    .rules-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .7rem;
    }
    .rules-list li {
      display: flex;
      gap: .75rem;
      align-items: flex-start;
      color: var(--text);
      font-size: .95rem;
      line-height: 1.7;
    }
    .rules-list li::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      margin-top: .55rem;
    }
    .rules-list li strong { color: var(--light); }

    .rules-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: .75rem;
      font-size: .9rem;
    }
    .rules-table th {
      background: rgba(200,146,42,.1);
      color: var(--gold);
      font-weight: 700;
      text-align: left;
      padding: .6rem .85rem;
      border: 1px solid var(--border);
      font-size: .8rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .rules-table td {
      padding: .55rem .85rem;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .rules-table tr:nth-child(even) td { background: rgba(255,255,255,.02); }

    .pic-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: rgba(168,32,13,.08);
      border: 1px solid rgba(168,32,13,.2);
      border-radius: var(--radius-lg);
      margin-top: 2rem;
    }
    .pic-card svg { color: var(--red); flex-shrink: 0; }
    .pic-card p { color: var(--text-muted); font-size: .88rem; max-width: none; margin: 0; }
    .pic-card strong { color: var(--light); display: block; margin-bottom: .1rem; }

    #sport-not-found { display: none; text-align: center; padding: 4rem 0; }
    #sport-not-found h2 { font-family: var(--display); font-size: 2rem; color: var(--light); margin-bottom: .75rem; }
    #sport-not-found p { color: var(--text-muted); }
  </style>
</head>

// ── RENDER ────────────────────────────────────
function renderSport() {
  const params = new URLSearchParams(window.location.search);
  const slug   = params.get('s') || '';
  const sport  = SPORTS[slug];

  if (!sport) {
    document.getElementById('sport-not-found').style.display = 'block';
    document.title = 'Sport Not Found — RENTAP XVII';
    return;
  }

  document.title = sport.name + ' Rules — RENTAP XVII';
  document.getElementById('sportTitle').textContent    = sport.name;
  document.getElementById('sportSubtitle').textContent = sport.subtitle + ' · RENTAP XVII Rules & Regulations';
  document.getElementById('heroIcon').innerHTML        = sport.icon;

  // Link to this sport's live results — hidden until go-live.
  // To re-enable: change SHOW_LIVE to true.
  const SHOW_LIVE = false;
  const liveLink = document.getElementById('liveResultsLink');
  if (liveLink && SHOW_LIVE) {
    liveLink.href = 'live.html#' + slug;
    liveLink.style.display = 'inline-flex';
  }

  // Chips
  const chipsEl = document.getElementById('sportChips');
  sport.chips.forEach(c => {
    const el = document.createElement('span');
    el.className = 'chip';
    el.textContent = c;
    chipsEl.appendChild(el);
  });

  // Rules content
  const content = document.getElementById('rulesContent');
  sport.sections.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'rules-section';

    const h = document.createElement('h2');
    h.className = 'rules-section-title';
    h.textContent = sec.title;
    div.appendChild(h);

    if (sec.table) {
      const tbl = document.createElement('table');
      tbl.className = 'rules-table';
      const thead = document.createElement('thead');
      const tr = document.createElement('tr');
      sec.table.headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
      tbl.appendChild(thead);
      const tbody = document.createElement('tbody');
      sec.table.rows.forEach(row => {
        const tr = document.createElement('tr');
        row.forEach(cell => {
          const td = document.createElement('td');
          td.textContent = cell;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      div.appendChild(tbl);
    }

    if (sec.rules) {
      const ul = document.createElement('ul');
      ul.className = 'rules-list';
      sec.rules.forEach(r => {
        const li = document.createElement('li');
        li.textContent = r;
        ul.appendChild(li);
      });
      div.appendChild(ul);
    }

    content.appendChild(div);
  });

  // PIC card
  if (sport.pic) {
    const card = document.createElement('div');
    card.className = 'pic-card';
    card.innerHTML = `
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13 19.79 19.79 0 0 1 1.62 4.34 2 2 0 0 1 3.59 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <div>
        <strong>Person In Charge (PIC): ${sport.pic.name}</strong>
        <p>Contact for questions and disputes: <a href="tel:${sport.pic.phone.replace(/\s/g,'')}">${sport.pic.phone}</a></p>
      </div>`;
    content.appendChild(card);
  }

  // General rules note
  const note = document.createElement('p');
  note.style.cssText = 'margin-top:2.5rem;color:var(--text-muted);font-size:.88rem;line-height:1.7;border-top:1px solid var(--border);padding-top:1.5rem;';
  note.innerHTML = 'These rules are based on the RENTAP Rulebook. The organising committee reserves the right to make amendments. All official decisions by referees and PICs are final. For full general event rules see the <a href="agb.html">AGB</a>.';
  content.appendChild(note);
}

renderSport();
</script>
