<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Registrations — RENTAP XVII Admin</title>
  <style>
    :root {
      --ink: #0D1209; --surface: #111810; --surface-2: #192218;
      --red: #A8200D; --gold: #C8922A; --light: #EDE8DE;
      --text: #D4CFBF; --muted: #7A8572; --border: #283021;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--ink); color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      padding: 2rem 1.5rem; line-height: 1.5;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 { color: var(--light); font-size: 1.5rem; margin: 0 0 0.25rem; }
    .sub { color: var(--muted); margin: 0 0 2rem; font-size: 0.9rem; }
    .gate { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; max-width: 420px; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type="password"], input[type="text"] {
      width: 100%; padding: 0.7rem 0.9rem; background: var(--ink);
      border: 1px solid var(--border); border-radius: 6px; color: var(--light); font-size: 1rem;
    }
    button {
      cursor: pointer; border: none; border-radius: 6px; font-weight: 600;
      padding: 0.7rem 1.2rem; font-size: 0.9rem; transition: opacity 150ms;
    }
    button:hover { opacity: 0.88; }
    .btn-primary { background: var(--red); color: #fff; margin-top: 1rem; }
    .btn-gold { background: var(--gold); color: var(--ink); }
    .toolbar { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .toolbar .count { color: var(--gold); font-weight: 700; }
    .tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .tab { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); padding: 0.45rem 0.9rem; border-radius: 999px; font-size: 0.85rem; }
    .tab.active { background: var(--gold); color: var(--ink); border-color: var(--gold); }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { text-align: left; padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--muted); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.06em; position: sticky; top: 0; background: var(--ink); }
    tr:hover td { background: var(--surface); }
    .pill { display: inline-block; padding: 0.15rem 0.55rem; border-radius: 4px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; }
    .pill-player { background: rgba(168,32,13,0.25); color: #f0a; color: #ff8a78; }
    .pill-volunteer { background: rgba(200,146,42,0.22); color: var(--gold); }
    .pill-spectator { background: rgba(237,232,222,0.15); color: var(--light); }
    .pill-vendor { background: rgba(15,138,77,0.25); color: #6dd39b; }
    .err { color: #ff8a78; margin-top: 0.75rem; font-size: 0.9rem; }
    .empty { color: var(--muted); padding: 2rem 0; text-align: center; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>RENTAP XVII — Registrations</h1>
  <p class="sub">Private admin view. Data is read live from the database.</p>

  <div id="gate" class="gate">
    <label for="key">Admin Key</label>
    <input type="password" id="key" placeholder="Enter admin key" autocomplete="off" />
    <button class="btn-primary" onclick="loadData()">View Registrations</button>
    <p id="gateErr" class="err" hidden></p>
  </div>

  <div id="dashboard" hidden>
    <div class="toolbar">
      <span>Total: <span class="count" id="count">0</span></span>
      <div class="tabs" id="tabs">
        <button class="tab active" data-type="all" onclick="setFilter('all', this)">All</button>
        <button class="tab" data-type="player" onclick="setFilter('player', this)">Players</button>
        <button class="tab" data-type="volunteer" onclick="setFilter('volunteer', this)">Volunteers</button>
        <button class="tab" data-type="spectator" onclick="setFilter('spectator', this)">Spectators</button>
        <button class="tab" data-type="vendor" onclick="setFilter('vendor', this)">Vendors</button>
      </div>
      <button class="btn-gold" style="margin-left:auto" onclick="downloadCSV()">Download CSV</button>
    </div>
    <div class="table-wrap">
      <table id="table">
        <thead>
          <tr>
            <th>#</th><th>Type</th><th>Name</th><th>Email</th><th>Phone</th><th>University</th>
            <th>Sport</th><th>Team</th><th>Role</th><th>Membership</th><th>Stall</th><th>Food</th><th>Registered</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <p id="emptyMsg" class="empty" hidden>No registrations yet.</p>
  </div>
</div>

<script>
  let allRows = [];
  let filter = 'all';
  let adminKey = '';

  async function loadData() {
    adminKey = document.getElementById('key').value.trim();
    const err = document.getElementById('gateErr');
    err.hidden = true;
    if (!adminKey) { err.textContent = 'Please enter the admin key.'; err.hidden = false; return; }

    try {
      const res = await fetch('/api/registrations?key=' + encodeURIComponent(adminKey));
      if (res.status === 401) { err.textContent = 'Incorrect admin key.'; err.hidden = false; return; }
      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();
      allRows = data.registrations || [];
      document.getElementById('gate').hidden = true;
      document.getElementById('dashboard').hidden = false;
      render();
    } catch (e) {
      err.textContent = 'Could not load data. Is the database connected?';
      err.hidden = false;
    }
  }

  function setFilter(type, btn) {
    filter = type;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function visibleRows() {
    return filter === 'all' ? allRows : allRows.filter(r => r.type === filter);
  }

  function esc(s) {
    return (s == null ? '' : String(s)).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
  }

  function render() {
    const rows = visibleRows();
    document.getElementById('count').textContent = rows.length;
    const tbody = document.getElementById('tbody');
    document.getElementById('emptyMsg').hidden = rows.length > 0;
    tbody.innerHTML = rows.map((r, i) => {
      const d = new Date(r.created_at);
      const when = isNaN(d) ? '' : d.toLocaleString();
      return `<tr>
        <td>${i + 1}</td>
        <td><span class="pill pill-${esc(r.type)}">${esc(r.type)}</span></td>
        <td>${esc(r.name)}</td>
        <td>${esc(r.email)}</td>
        <td>${esc(r.phone)}</td>
        <td>${esc(r.university)}</td>
        <td>${esc(r.sport)}</td>
        <td>${esc(r.team)}</td>
        <td>${esc(r.role)}</td>
        <td>${esc(r.membership)}</td>
        <td>${esc(r.stall)}</td>
        <td>${esc(r.food)}</td>
        <td>${esc(when)}</td>
      </tr>`;
    }).join('');
  }

  function downloadCSV() {
    const rows = visibleRows();
    const headers = ['id', 'type', 'name', 'email', 'phone', 'university', 'sport', 'team', 'role', 'membership', 'stall', 'food', 'created_at'];
    const csvCell = v => '"' + (v == null ? '' : String(v)).replace(/"/g, '""') + '"';
    const lines = [headers.join(',')];
    rows.forEach(r => lines.push(headers.map(h => csvCell(r[h])).join(',')));
    const blob = new Blob([lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rentap-registrations-' + (filter === 'all' ? 'all' : filter) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  document.getElementById('key').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadData();
  });
</script>
</body>
</html>
